<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>최상록 | S&I Corp. 전자명함</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    background: #e8eaf0;
    font-family: 'Noto Sans KR', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ── 전체 래퍼: 모바일에서 화면 꽉 채우기 ── */
  .page {
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(155deg, #c5d0ff 0%, #d8d0fa 30%, #e5d2f9 58%, #efd8fa 80%, #f8e8fc 100%);
    padding: 0;
  }

  /* ── 카드: 모바일 3:4 비율 꽉 채움 ── */
  .card {
    width: 100%;
    max-width: 430px;
    background: rgba(255,255,255,0.80);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
    border-radius: 0;
    border: none;
    box-shadow: none;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* 모바일: 뷰포트 꽉 채우기 */
  @media (max-width: 480px) {
    .page {
      align-items: stretch;
      justify-content: stretch;
    }
    .card {
      max-width: 100%;
      min-height: 100dvh;
      border-radius: 0;
    }
  }

  /* 데스크탑: 카드 형태 */
  @media (min-width: 481px) {
    .card {
      border-radius: 28px;
      border: 1.5px solid rgba(255,255,255,0.92);
      box-shadow: 0 12px 60px rgba(120,100,200,0.22);
    }
  }

  /* ── TOP 영역 ── */
  .card-top {
    background: linear-gradient(150deg, #a8bbff 0%, #c4b8f5 45%, #d8c8f6 100%);
    padding: 0;
    display: flex;
    gap: 0;
    flex-shrink: 0;
  }

  /* 사진 영역 */
  .photo-wrap {
    flex-shrink: 0;
    width: 44vw;
    max-width: 190px;
    position: relative;
    overflow: hidden;
  }

  @media (min-width: 481px) {
    .photo-wrap {
      width: 170px;
      max-width: 170px;
    }
  }

  .profile-img {
    width: 100%;
    aspect-ratio: 3/4;
    object-fit: cover;
    object-position: center top;
    display: block;
  }

  /* 오른쪽 정보 패널 */
  .info-panel {
    flex: 1;
    padding: 16px 14px 14px 12px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 0;
  }

  .company-block { margin-bottom: 6px; }

  .company-line {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: clamp(20px, 5.5vw, 26px);
    line-height: 1;
    letter-spacing: -0.5px;
  }
  .company-line .red { color: #c42f2f; }
  .company-line .blue { color: #182c80; }
  .company-line .corp { font-size: clamp(12px, 3.2vw, 15px); color: #22368a; margin-left: 1px; }

  .company-sub {
    font-size: clamp(9px, 2.1vw, 11px);
    color: rgba(50,40,105,0.7);
    line-height: 1.55;
    margin-top: 4px;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: rgba(150,130,210,0.28);
    margin: 8px 0;
  }

  .name-kr {
    font-size: clamp(22px, 6vw, 30px);
    font-weight: 900;
    color: #16134a;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }
  .name-en {
    font-size: clamp(9px, 2.2vw, 11px);
    color: #7068a0;
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    letter-spacing: 1px;
    margin-top: 2px;
  }

  .title-text {
    font-size: clamp(10px, 2.5vw, 12px);
    font-weight: 700;
    color: #2a2260;
    line-height: 1.6;
    margin-top: 6px;
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 8px;
  }
  .tag {
    padding: 3px 8px;
    border-radius: 8px;
    font-size: clamp(8px, 1.9vw, 10px);
    font-weight: 700;
    background: rgba(180,168,240,0.28);
    border: 1px solid rgba(150,130,210,0.32);
    color: #4a3d90;
    white-space: nowrap;
  }

  /* ── 연락처 영역 ── */
  .contacts {
    padding: 4px 10px 10px;
    flex: 1;
  }

  .contact-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: clamp(8px, 2.2vw, 11px) 8px;
    border-bottom: 1px solid rgba(175,158,220,0.15);
    text-decoration: none;
    border-radius: 10px;
    transition: background 0.13s;
    gap: 8px;
  }
  .contact-row:last-child { border-bottom: none; }
  .contact-row:hover, .contact-row:active { background: rgba(180,168,240,0.16); }

  .contact-label {
    font-size: clamp(10px, 2.5vw, 12px);
    color: #9890c0;
    font-weight: 500;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .contact-value {
    font-size: clamp(11px, 2.8vw, 13px);
    font-weight: 700;
    color: #2a2260;
    text-align: right;
    word-break: break-all;
  }
  .contact-value.youtube { color: #c42f2f; }
  .contact-value.addr { line-height: 1.5; }

  /* ── 저장 버튼 ── */
  .save-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin: 8px 12px 14px;
    padding: 13px;
    border-radius: 14px;
    background: linear-gradient(135deg, #7c6fff 0%, #a780f8 100%);
    color: #fff;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 700;
    font-size: 14px;
    border: none;
    cursor: pointer;
    text-decoration: none;
    box-shadow: 0 4px 18px rgba(120,100,230,0.35);
    transition: transform 0.13s, box-shadow 0.13s;
    letter-spacing: 0.2px;
    flex-shrink: 0;
  }
  .save-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(120,100,230,0.45); }
  .save-btn:active { transform: translateY(0); }
  .save-btn i { font-size: 18px; }
</style>
</head>
